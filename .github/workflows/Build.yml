name: Build

on: workflow_dispatch

# ---------------------------------------------------------------------------
# These permissions are REQUIRED for SignPath origin verification.
# id-token:write  -> lets GitHub issue an OIDC token so SignPath can confirm
#                    "this artifact was produced by THIS workflow run".
# actions:read    -> lets the SignPath connector read workflow-job details.
# contents:read   -> needed for checkout.
# ---------------------------------------------------------------------------
permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest
    environment: webview_build
    env:
      API_URL: ${{ secrets.API_URL }}
      API_WS_URL: ${{ secrets.API_WS_URL }}
      LOCAL_API_URL: ${{ vars.LOCAL_API_URL }}
      LOCAL_API_SECRET_KEY: ${{ secrets.LOCAL_API_SECRET_KEY }}
      API_SECRET_KEY: ${{ secrets.LOCAL_API_SECRET_KEY }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update submodules
        run: |
          git submodule update --recursive --remote

      - name: Build webview ui
        run: |
          cd T3000Webview
          npm install
          npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Build webview api
        run: |
          cd T3000Webview/api
          cargo build --target=i686-pc-windows-msvc --release

      - name: Get T3000 version number
        id: version
        run: |
          $version = Get-Date -Format "yyyyMMdd"
          Write-Output version=$version >> $Env:GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: |
          msbuild "T3000 - VS2019.sln" /p:Platform=x86 /p:Configuration=Release /p:ProjectVersion=${{ steps.version.outputs.version }}

      - name: Clean & Organize Files
        continue-on-error: true
        run: |
          del "T3000 Output\release\*.pdb"
          del "T3000 Output\release\*.lib"
          del "T3000 Output\release\*.exp"
          del "T3000 Output\release\*.ilk"
          del "T3000 Output\release\ReadSinglePropDescr.xml"
          del "T3000 Output\release\BacnetExplore.exe.config"
          xcopy "T3000Webview\dist\spa\" "T3000 Output\release\ResourceFile\webview\www\" /E /H /C /I /y
          xcopy "T3000Webview\api\target\i686-pc-windows-msvc\release\t3_webview_api.dll" "T3000 Output\release\" /Y
          xcopy "T3000Webview\api\target\i686-pc-windows-msvc\release\t3_webview_api.dll.lib" "T3000 Output\release\" /Y

      # -----------------------------------------------------------------------
      # SIGNING - origin-verification-compliant approach
      #
      # SignPath must verify:
      #   1. The artifact was built by GitHub Actions (proven via OIDC token)
      #   2. It came from this exact repository + workflow run
      #   3. The artifact was stored as a GitHub Actions artifact *before*
      #      the signing request was submitted (not POSTed directly as bytes)
      #
      # Flow:
      #   a) Stage the PE files -> upload-artifact@v4 (GitHub zips them)
      #   b) signpath/github-action-submit-signing-request@v2 submits the
      #      *GitHub artifact ID* (not the file bytes), waits, then downloads
      #      the signed zip to output-artifact-directory
      #   c) Copy signed files back over the release folder
      #   d) Same pattern for the MSI installer
      #
      # One-time prerequisites (GitHub + SignPath UI):
      #   * Install the SignPath GitHub App on this repository
      #     https://github.com/apps/signpath
      #   * Add the "GitHub.com" Trusted Build System in SignPath and link it
      #     to this project
      #   * Update the SignPath artifact configurations (Sign-PE / Sign-MSI)
      #     to use <zip-file> as the root element, because GitHub Actions
      #     always wraps artifacts in a ZIP archive
      # -----------------------------------------------------------------------

      - name: Stage PE files for signing
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "signing-input" -Force

          $filesToSign = @(
            "T3000 Output\release\T3000.exe",
            "T3000 Output\release\BacnetExplore.exe",
            "T3000 Output\release\ISP.exe",
            "T3000 Output\release\ModbusPoll.exe",
            "T3000 Output\release\Update.exe",
            "T3000 Output\release\BACnet_Stack_Library.dll",
            "T3000 Output\release\FlexSlideBar.dll",
            "T3000 Output\release\ModbusDllforVc.dll",
            "T3000 Output\release\T3000Controls.dll",
            "T3000 Output\release\t3_webview_api.dll"
          )

          # Excluded (3rd-party, not owned by Temco):
          #   sqlite3.dll        - SQLite Consortium
          #   WebView2Loader.dll - Microsoft

          $missing = @()
          foreach ($file in $filesToSign) {
            if (-not (Test-Path $file)) {
              $missing += $file
              Write-Host "MISSING: $file"
            } else {
              Copy-Item $file "signing-input\" -Force
              Write-Host "Staged: $(Split-Path $file -Leaf)"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing $($missing.Count) file(s) to sign"
            exit 1
          }

      # upload-artifact@v4 zips the staged directory automatically.
      # SignPath reads this zip from GitHub (not from our runner), signs all
      # PE files inside it, and returns a new zip with signed binaries.
      - name: Upload unsigned PE files as GitHub artifact
        id: upload-pe
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: signing-input/

      # The official SignPath action provides origin verification because:
      #   - It reads the OIDC token to prove it runs in THIS workflow
      #   - It passes the GitHub artifact-id (not raw bytes), so SignPath
      #     can fetch the artifact directly from GitHub and confirm provenance
      - name: Sign PE files with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: 'Sign-PE'
          github-artifact-id: '${{ steps.upload-pe.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-binaries'
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Copy signed PE files back to release directory
        shell: pwsh
        run: |
          $signedFiles = Get-ChildItem "signed-binaries" -Recurse -File
          foreach ($f in $signedFiles) {
            Copy-Item $f.FullName "T3000 Output\release\" -Force
            Write-Host "Restored signed: $($f.Name)"
          }
          Write-Host "All signed PE files copied back to release directory."

      - name: Set the installer version ( doesn't accept big numbers so we add a point )
        id: iversion
        run: |
          $iversion = '${{ steps.version.outputs.version }}'
          $iversion = $iversion.Insert(4,'.')
          Write-Output iversion=$iversion >> $Env:GITHUB_OUTPUT

      - name: Build the installer
        uses: caphyon/advinst-github-action@main
        with:
          advinst-version: "21.4"
          advinst-enable-automation: "true"
          aip-path: ${{ github.workspace }}\T3000.aip
          aip-build-name: DefaultBuild
          aip-package-name: T3000-setup.msi
          aip-output-dir: ${{ github.workspace }}\setup
          aip-commands: |
            AddFolder "APPDIR" ".\T3000 Output\release" -install_in_parent_folder
            AddFolder "APPDIR" ".\T3000InstallShield\PH_Application"
            AddFolder "APPDIR" ".\T3000InstallShield\Psychrometry"
            SetProductCode -langid 1033
            SetVersion ${{ steps.iversion.outputs.iversion }}

      - name: Upload unsigned MSI as GitHub artifact
        id: upload-msi
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: setup/T3000-setup.msi

      - name: Sign MSI installer with SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: 'Sign-MSI'
          github-artifact-id: '${{ steps.upload-msi.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-installer'
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Move signed MSI back to setup directory
        shell: pwsh
        run: |
          $msi = Get-ChildItem "signed-installer" -Recurse -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "Signed MSI not found in signed-installer/"; exit 1 }
          Copy-Item $msi.FullName "setup\T3000-setup.msi" -Force
          Write-Host "Signed MSI restored: $($msi.FullName)"

      - name: Upload the signed installer to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T3000-setup
          path: setup/T3000-setup.msi

      - name: Prepare & zip the update files
        run: |
          Rename-Item -Path ".\T3000 Output\release\Update.exe" -NewName "UpdateEng.exe"
          Compress-Archive -Path ".\T3000 Output\release\*" -CompressionLevel Optimal -DestinationPath .\20T3000Update.zip

      - name: Upload the update files to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 20T3000Update
          path: T3000 Output/release/*

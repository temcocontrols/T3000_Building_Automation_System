# This workflow now builds T3000Controls and BACnetStackLibrary components

name: Testing the MSBuild

# On master make sure both push and a pull request builds this action
on:
  push:
    branches: [ master ]
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '.github/**'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ============================================================
      # аТдіЃКАВзА MFC КЭ .NET 4.5.2 ФПБъАќ
      # Вхдк Setup MSBuild жЎКѓЁЂBuild Solution жЎЧА
      # ============================================================
 - name: Install MFC and .NET 4.5.2 targeting pack
        shell: pwsh
        run: |
          # 1. гУ Chocolatey АВзА .NET 4.5.2 Developer Pack
          Write-Host "Installing .NET 4.5.2 Developer Pack via Chocolatey..."
          choco install netfx-4.5.2-devpack -y --no-progress
          Write-Host ".NET 4.5.2 Developer Pack installed."

          # 2. АВзА MFC for VS 2022 (x86 + x64)
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          Write-Host "Installing MFC..."
          Start-Process -FilePath $vsInstaller -ArgumentList @(
            "modify",
            "--installPath", "`"$vsPath`"",
            "--add", "Microsoft.VisualStudio.Component.VC.ATLMFC.x86.x64",
            "--quiet",
            "--norestart"
          ) -Wait -NoNewWindow
          Write-Host "MFC installed."


      - name: Build Solution
        run: |
          msbuild "T3000 - VS2019.sln" /p:Platform=x86 /p:Configuration=Release /p:ProjectVersion=20260605